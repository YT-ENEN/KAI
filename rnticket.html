<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銳能娛樂報名系統 | REBORN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; }
        .font-esport { font-family: 'Oswald', sans-serif; }
        .glass-dark { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); border-left: 1px solid rgba(255, 215, 0, 0.3); }
        .neon-shadow { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .hover-neon:hover { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); text-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
        .tech-clip { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%); }
        .loader-spin { border-top-color: #FFD700; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 3px; }
        select option { background-color: #1a1a1a; color: #fff; }
    </style>
</head>
<body class="relative min-h-screen text-gray-900 overflow-x-hidden pt-[80px]">

    <div id="globalLoader" class="fixed inset-0 bg-black/80 z-[100] hidden flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-16 h-16 border-4 border-gray-600 rounded-full loader-spin mb-4"></div>
        <div class="text-[#FFD700] font-esport font-bold tracking-widest animate-pulse">SYSTEM PROCESSING...</div>
    </div>

    <nav class="w-full fixed top-0 z-50 glass-dark text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="text-2xl font-black tracking-wider flex items-center gap-2">
            <span class="text-[#FFD700]">⚡ REBORN</span> 銳能娛樂
        </div>
        <div id="loginSection" class="flex items-center gap-4">
            <button onclick="openRegisterModal()" class="text-sm font-bold text-gray-400 hover:text-white transition hidden sm:block">戰隊註冊</button>
            <button onclick="simulateLogin()" class="text-sm font-bold bg-white text-black px-4 py-1.5 rounded hover:bg-[#FFD700] transition">戰隊登入</button>
            <div id="loggedInUser" class="hidden flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <span class="block text-xs text-gray-400 mb-0.5">已登入隊長</span>
                    <span id="displayTeamName" class="font-esport text-[#FFD700] tracking-wider font-bold text-lg"></span>
                </div>
                <div class="w-10 h-10 bg-gray-800 rounded-full border-2 border-[#FFD700] flex items-center justify-center font-bold text-[#FFD700]">C</div>
                <button onclick="logout()" class="text-xs text-gray-500 hover:text-white transition ml-2">登出</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-end mb-8 border-b border-gray-300 pb-4">
            <h1 class="text-4xl font-black">賽事列表 <span class="text-gray-400 text-2xl font-esport">EVENTS</span></h1>
            <div class="flex items-center gap-4">
                <span id="refreshIndicator" class="text-xs text-gray-400 font-bold hidden items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> 狀態即時同步中</span>
                <button onclick="toggleQueryPanel()" class="text-sm font-bold text-white bg-black px-4 py-2 hover:text-[#FFD700] transition tech-clip border border-[#FFD700]/30">賽事狀態查詢 🔍</button>
            </div>
        </div>
        <div id="eventGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="text-gray-400 font-bold col-span-3 text-center py-12 animate-pulse">正在載入賽事資訊...</div>
        </div>
    </main>

    <div id="queryPanel" class="fixed right-0 top-0 h-full w-[400px] max-w-full glass-panel z-50 text-white shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-black/50">
            <h3 class="text-xl font-bold flex items-center gap-2">
                <svg class="w-5 h-5 text-[#FFD700]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                我的報名與匯款
            </h3>
            <button onclick="toggleQueryPanel()" class="text-gray-400 hover:text-white text-2xl">✕</button>
        </div>
        <div class="p-6 flex-1 overflow-y-auto">
            <div id="queryResultContainer"><div class="text-gray-500 text-center py-10 text-sm">請點擊下方按鈕載入紀錄</div></div>
            <button onclick="fetchQueryData()" class="w-full bg-white text-black font-bold py-3 mt-4 hover:bg-gray-200 transition tech-clip shadow-lg">載入 / 更新狀態</button>
        </div>
    </div>

    <div id="bookingModal" class="fixed inset-0 bg-black/90 z-[60] hidden flex flex-col items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-gray-900 border border-gray-700 p-6 w-full max-w-2xl tech-clip relative max-h-full flex flex-col">
            <button onclick="closeBookingModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl z-10">✕</button>
            <h2 class="text-white text-2xl font-bold mb-1 flex items-center gap-2 pr-8" id="bookEventTitle">選取報名組數與位置</h2>
            <p class="text-gray-400 text-xs mb-4 pb-4 border-b border-gray-700 flex-shrink-0">點擊下方空位進行選擇，單一賽事最高限購 3 組。</p>
            
            <div class="overflow-y-auto flex-1 pr-2">
                
                <div class="bg-gray-800 p-3 rounded border-l-4 border-[#FFD700] mb-5">
                    <h4 class="text-[#FFD700] font-bold text-xs mb-1 flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 主辦方指定匯款資訊</h4>
                    <p class="text-gray-300 text-sm whitespace-pre-line tracking-wide" id="paymentInstructionsDisplay">載入中...</p>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>主辦方舞台區</span>
                        <div class="flex gap-3">
                            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-gray-700"></div> 鎖定</span>
                            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-[#FFD700]"></div> 已選</span>
                            <span class="flex items-center gap-1"><div class="w-3 h-3 border border-gray-500"></div> 空位</span>
                        </div>
                    </div>
                    <div id="seatGrid" class="grid grid-cols-4 md:grid-cols-6 gap-3 bg-black/50 p-4 rounded border border-gray-800"></div>
                </div>

                <div class="bg-black/80 p-4 rounded border border-gray-700 mb-6 flex justify-between items-end">
                    <div>
                        <span class="block text-gray-400 text-sm mb-1">已選位置： <span id="selectedSeatsList" class="text-white font-bold">無</span></span>
                        <span class="block text-gray-400 text-sm">賽事單價： NT$ <span id="eventFeeDisplay">0</span></span>
                    </div>
                    <div class="text-right">
                        <span class="block text-gray-500 text-sm mb-1">總計金額 TOTAL</span>
                        <span class="font-esport text-3xl font-bold text-[#FFD700]">NT$ <span id="totalPriceDisplay">0</span></span>
                    </div>
                </div>

                <form onsubmit="submitForm(event)">
                    <div class="mb-6">
                        <label class="block text-gray-400 text-sm mb-2 font-bold text-[#FFD700]">🏆 設定參賽隊名與繳費方式</label>
                        <div id="dynamicTeamInputs" class="bg-black/40 p-4 rounded border border-gray-800 space-y-4">
                            <div class="text-gray-500 text-sm text-center py-2">請先在上方選擇位置</div>
                        </div>
                    </div>
                    <button type="submit" id="finalSubmitBtn" disabled class="w-full bg-gray-600 text-gray-400 font-black py-4 tech-clip transition text-lg cursor-not-allowed flex-shrink-0">請先選擇至少一個位置</button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="registerModal" class="fixed inset-0 bg-black/90 z-[70] hidden flex flex-col items-center justify-center backdrop-blur-sm"><div class="bg-gray-900 border border-gray-700 p-8 w-[90%] max-w-md tech-clip relative"><button onclick="document.getElementById('registerModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">✕</button><h2 class="text-white text-xl font-bold mb-6 border-b border-gray-700 pb-2 flex items-center gap-2"><span class="text-[#FFD700]">⚡</span> 建立新戰隊</h2><form onsubmit="submitRegister(event)"><div class="mb-4"><input type="text" id="regUid" placeholder="隊長UID" required class="w-full bg-black border border-gray-600 text-white px-4 py-2 focus:border-[#FFD700] focus:outline-none mb-2"><input type="password" id="regPassword" placeholder="密碼" required class="w-full bg-black border border-gray-600 text-white px-4 py-2 focus:border-[#FFD700] focus:outline-none mb-2"><input type="text" id="regTeamName" required placeholder="戰隊名稱" class="w-full bg-black border border-gray-600 text-[#FFD700] px-4 py-2 focus:border-[#FFD700] focus:outline-none mb-2 font-bold"><input type="text" id="regCaptain" placeholder="隊長名稱" required class="w-full bg-black border border-gray-600 text-white px-4 py-2 focus:border-[#FFD700] focus:outline-none mb-2"><input type="text" id="regContact" placeholder="聯絡方式" required class="w-full bg-black border border-gray-600 text-white px-4 py-2 focus:border-[#FFD700] focus:outline-none mb-4"></div><button type="submit" class="w-full bg-white text-black font-black py-3 tech-clip hover:bg-[#FFD700]">確認註冊</button></form></div></div>

    <script>
        // 🔴🔴🔴 請替換為您的 Apps Script 網址 🔴🔴🔴
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyhUgKNe0fsdK-0_2-kjQ4fJ3Y2yE3qnGwJD7bfio3Yz3R6oAbF34PSAoJ4Ws-MmKD_ow/exec';

        let currentUser = null;
        let currentEvent = null; 
        let selectedSeats = [];  

        function showLoader() { document.getElementById('globalLoader').classList.remove('hidden'); document.getElementById('globalLoader').classList.add('flex'); }
        function hideLoader() { document.getElementById('globalLoader').classList.add('hidden'); document.getElementById('globalLoader').classList.remove('flex'); }

        window.onload = () => {
            fetchEventList();
            setInterval(() => fetchEventList(true), 15000); 
        };

        async function fetchEventList(silent = false) {
            if(!silent) document.getElementById('eventGrid').innerHTML = '<div class="text-gray-400 font-bold col-span-3 text-center py-12 animate-pulse">正在載入賽事資訊...</div>';
            else document.getElementById('refreshIndicator').classList.remove('hidden');
            
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if (result.success && result.data.length > 0) {
                    window.eventsData = result.data;
                    let html = '';
                    result.data.forEach(event => html += createEventCard(event));
                    document.getElementById('eventGrid').innerHTML = html;
                }
            } catch (error) {
                if(!silent) document.getElementById('eventGrid').innerHTML = '<div class="text-red-400 col-span-3 text-center py-12">系統連線失敗。</div>';
            } finally {
                if(silent) setTimeout(() => document.getElementById('refreshIndicator').classList.add('hidden'), 2000);
            }
        }

        function createEventCard(event) {
            const dateStr = new Date(event.Date).toISOString().split('T')[0];
            const reserved = event.ReservedSlots || 0;
            const remainingSlots = event.TotalSlots - reserved - event.takenSlots.length;
            const displayTotal = event.TotalSlots - reserved; 
            
            let noteHtml = event.OrganizerNote ? `<div class="bg-gray-800 text-yellow-400 text-xs p-2 rounded mb-4 border-l-2 border-yellow-400">${event.OrganizerNote}</div>` : '';

            if (event.Status === '已完賽' || event.Status === '已售完') {
                return `<div class="glass-dark text-white tech-clip relative opacity-60 grayscale"><div class="absolute inset-0 bg-black/60 z-10 flex flex-col items-center justify-center backdrop-blur-sm"><span class="text-3xl font-esport font-black tracking-widest text-gray-300 border-2 border-gray-300 p-2 transform -rotate-12">${event.Status === '已完賽' ? 'COMPLETED' : 'SOLD OUT'}</span></div><div class="p-8 relative z-0"><div class="flex justify-between items-start mb-4"><span class="bg-gray-600 text-white text-xs font-black px-3 py-1 tech-clip">${event.Mode}</span></div><h2 class="text-2xl font-bold mb-2">${event.EventName}</h2><p class="text-gray-400 text-sm mb-4">${dateStr} 開賽</p>${noteHtml}</div></div>`;
            }

            if (event.Status === '即將開放') {
                const openDate = new Date(event.OpenTime);
                const openStr = `${openDate.getMonth() + 1}月${openDate.getDate()}日 ${String(openDate.getHours()).padStart(2, '0')}:${String(openDate.getMinutes()).padStart(2, '0')}`;
                return `<div class="glass-dark text-white tech-clip relative group transition-all duration-300 border-t-4 border-t-blue-500"><div class="absolute -bottom-4 -right-4 text-[80px] font-esport font-black text-white/5 pointer-events-none select-none">${event.Mode}</div><div class="p-8"><div class="flex justify-between items-start mb-4"><span class="bg-blue-600 text-white text-xs font-black px-3 py-1 tech-clip">${event.Mode}</span><span class="text-xs text-blue-400 border border-blue-400 px-2 py-1 rounded font-bold">即將開放</span></div><h2 class="text-2xl font-bold mb-2">${event.EventName}</h2><p class="text-gray-400 text-sm mb-4">${dateStr} 開賽</p>${noteHtml}<div class="flex justify-between items-end mb-8 bg-black/40 p-4 rounded"><div class="w-full text-center text-[#FFD700] font-bold tracking-widest text-sm">${openStr} 正式開放報名</div></div><button disabled class="w-full bg-gray-800 text-blue-500 font-black py-4 tech-clip cursor-not-allowed text-lg tracking-widest">時間未到 尚未開放</button></div></div>`;
            }

            return `<div class="glass-dark text-white tech-clip relative group transition-all duration-300 hover:-translate-y-2 border-t-4 border-t-[#FFD700]"><div class="absolute -bottom-4 -right-4 text-[80px] font-esport font-black text-white/5 pointer-events-none select-none">${event.Mode}</div><div class="p-8"><div class="flex justify-between items-start mb-4"><span class="bg-[#FFD700] text-black text-xs font-black px-3 py-1 tech-clip font-esport">${event.Mode}</span><span class="text-xs text-[#FFD700] border border-[#FFD700] px-2 py-1 rounded">報名中</span></div><h2 class="text-2xl font-bold mb-2">${event.EventName}</h2><p class="text-gray-400 text-sm mb-4">${dateStr} 開賽</p>${noteHtml}<div class="flex justify-between items-end mb-8 bg-black/40 p-4 rounded-lg border border-gray-800"><div><span class="block text-gray-500 text-xs mb-1">報名費</span><span class="font-esport text-xl text-white">NT$ ${event.Fee}</span></div><div class="text-right"><span class="block text-gray-500 text-xs mb-1">剩餘空位</span><span class="font-esport text-xl font-bold text-[#FFD700]">${remainingSlots} / ${displayTotal}</span></div></div><button onclick="openSeatSelector('${event.EventID}')" class="w-full bg-[#FFD700] text-black font-black py-4 tech-clip hover-neon transition-all duration-300 text-lg tracking-widest">選位與報名</button></div></div>`;
        }

        function openSeatSelector(eventID) {
            if (!currentUser) return alert('請先登入戰隊帳號！');
            currentEvent = window.eventsData.find(e => e.EventID === eventID);
            selectedSeats = [];
            
            document.getElementById('bookEventTitle').innerText = currentEvent.EventName;
            document.getElementById('eventFeeDisplay').innerText = currentEvent.Fee;
            
            // 💡 載入匯款資訊顯示
            document.getElementById('paymentInstructionsDisplay').innerText = currentEvent.PaymentInstructions || '主辦方尚未設定匯款資訊，請稍後詢問。';

            updateSeatCart();

            const grid = document.getElementById('seatGrid');
            grid.innerHTML = '';
            
            for(let i=1; i<=currentEvent.TotalSlots; i++) {
                let isReserved = i <= currentEvent.ReservedSlots;
                let isTaken = currentEvent.takenSlots.includes(i);
                
                let btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'py-3 text-center rounded text-sm font-bold font-esport transition-all relative overflow-hidden ';
                btn.innerText = i < 10 ? '0'+i : i;
                
                if(isReserved || isTaken) {
                    btn.className += 'bg-gray-700 text-gray-500 cursor-not-allowed opacity-50';
                    btn.disabled = true;
                    btn.innerHTML += `<div class="absolute inset-0 flex items-center justify-center text-[10px] text-black bg-black/50 tracking-widest backdrop-blur-[1px]">${isReserved?'保留':'售出'}</div>`;
                } else {
                    btn.className += 'border border-gray-500 hover:border-[#FFD700] hover:text-[#FFD700] text-gray-300';
                    btn.onclick = () => toggleSeat(i, btn);
                }
                grid.appendChild(btn);
            }
            document.getElementById('bookingModal').classList.remove('hidden');
        }

        function toggleSeat(seatNo, btn) {
            const idx = selectedSeats.indexOf(seatNo);
            if (idx > -1) {
                selectedSeats.splice(idx, 1);
                btn.classList.remove('bg-[#FFD700]', 'text-black', 'border-[#FFD700]', 'neon-shadow');
                btn.classList.add('border-gray-500', 'text-gray-300');
            } else {
                if (selectedSeats.length >= 3) return alert('單一賽事最高限購 3 組！');
                selectedSeats.push(seatNo);
                btn.classList.remove('border-gray-500', 'text-gray-300');
                btn.classList.add('bg-[#FFD700]', 'text-black', 'border-[#FFD700]', 'neon-shadow');
            }
            selectedSeats.sort((a,b) => a-b);
            updateSeatCart();
        }

        function changePayMethod(seat) {
            const method = document.getElementById(`payMethod_${seat}`).value;
            const input = document.getElementById(`payInfo_${seat}`);
            if (method === '轉帳') {
                input.placeholder = '帳號末 5 碼 (可先留空)';
                input.maxLength = 5;
            } else {
                input.placeholder = '收據機號/時間分行 (可先留空)';
                input.maxLength = 20;
            }
        }

        function updateSeatCart() {
            document.getElementById('selectedSeatsList').innerText = selectedSeats.length ? selectedSeats.join(', ') + ' 號' : '無';
            document.getElementById('totalPriceDisplay').innerText = selectedSeats.length * currentEvent.Fee;
            
            const container = document.getElementById('dynamicTeamInputs');
            const submitBtn = document.getElementById('finalSubmitBtn');
            
            const currentValues = {};
            selectedSeats.forEach(seat => {
                if (document.getElementById(`teamName_${seat}`)) {
                    currentValues[seat] = {
                        name: document.getElementById(`teamName_${seat}`).value,
                        method: document.getElementById(`payMethod_${seat}`).value,
                        info: document.getElementById(`payInfo_${seat}`).value
                    };
                }
            });

            container.innerHTML = '';
            let allowedMethods = (currentEvent.PaymentMethods || '轉帳').split(',').map(s=>s.trim());

            if (selectedSeats.length > 0) {
                submitBtn.disabled = false;
                submitBtn.className = 'w-full bg-[#FFD700] text-black font-black py-4 tech-clip hover-neon transition text-lg';
                
                selectedSeats.forEach((seat, index) => {
                    const suffix = String.fromCharCode(65 + index); 
                    const defaultName = currentValues[seat]?.name || (selectedSeats.length > 1 ? `${currentUser.teamName} ${suffix}隊` : currentUser.teamName);
                    const defaultMethod = currentValues[seat]?.method || allowedMethods[0];
                    const defaultInfo = currentValues[seat]?.info || '';
                    
                    let optionsHtml = '';
                    allowedMethods.forEach(method => {
                        optionsHtml += `<option value="${method}" ${defaultMethod === method ? 'selected' : ''}>${method === '轉帳' ? 'ATM/網銀轉帳' : '無卡存款'}</option>`;
                    });
                    
                    container.innerHTML += `
                    <div class="bg-black/60 p-3 rounded border border-gray-700 flex flex-col gap-3 relative">
                        <div class="absolute -left-2 -top-2 bg-[#FFD700] text-black font-esport font-black w-6 h-6 flex items-center justify-center rounded">${seat}</div>
                        <div class="flex items-center gap-2 pl-4">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            <input type="text" id="teamName_${seat}" value="${defaultName}" required class="flex-1 bg-transparent text-[#FFD700] border-b border-gray-600 focus:border-[#FFD700] focus:outline-none placeholder-gray-600 font-bold font-esport">
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 pl-4">
                            <select id="payMethod_${seat}" onchange="changePayMethod(${seat})" class="bg-gray-800 border border-gray-600 text-gray-300 px-2 py-1 text-sm rounded focus:border-[#FFD700] outline-none">
                                ${optionsHtml}
                            </select>
                            <input type="text" id="payInfo_${seat}" value="${defaultInfo}" class="flex-1 bg-black border border-gray-600 text-white px-3 py-1 text-sm rounded focus:border-[#FFD700] outline-none placeholder-gray-600 tracking-wider" placeholder="${defaultMethod==='轉帳'?'帳號末 5 碼 (可先留空)':'收據機號/時間分行 (可先留空)'}">
                        </div>
                    </div>`;
                });
            } else {
                submitBtn.disabled = true;
                submitBtn.className = 'w-full bg-gray-600 text-gray-400 font-black py-4 tech-clip transition text-lg cursor-not-allowed';
                container.innerHTML = '<div class="text-gray-500 text-sm text-center py-2">請先在上方選擇位置</div>';
            }
        }

        function closeBookingModal() { document.getElementById('bookingModal').classList.add('hidden'); }

        async function submitForm(e) {
            e.preventDefault();
            const teamNames = [];
            const payments = [];
            
            selectedSeats.forEach(seat => {
                teamNames.push(document.getElementById(`teamName_${seat}`).value);
                const method = document.getElementById(`payMethod_${seat}`).value;
                const info = document.getElementById(`payInfo_${seat}`).value;
                payments.push(info ? `${method}: ${info}` : '未填寫');
            });
            
            showLoader();
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'bookSlot', eventID: currentEvent.EventID, uid: currentUser.uid, 
                        teamNames: teamNames, payments: payments, slots: selectedSeats 
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert(result.message);
                    closeBookingModal();
                    fetchEventList(true); 
                } else alert(result.message);
            } catch (error) { alert("伺服器連線異常"); } finally { hideLoader(); }
        }

        function toggleQueryPanel() {
            const panel = document.getElementById('queryPanel');
            panel.classList.toggle('translate-x-full'); panel.classList.toggle('translate-x-0');
        }

        function changeUpdatePayMethod(regID) {
            const method = document.getElementById(`updatePayMethod_${regID}`).value;
            const input = document.getElementById(`payUpdate_${regID}`);
            if (method === '轉帳') { input.placeholder = '末5碼'; input.maxLength = 5; } 
            else { input.placeholder = '收據機號/時間'; input.maxLength = 20; }
        }

        async function fetchQueryData() {
            if (!currentUser) return alert('請先登入！');
            showLoader();
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'queryStatus', uid: currentUser.uid }) });
                const result = await response.json();
                const container = document.getElementById('queryResultContainer');
                container.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    result.data.forEach(reg => {
                        let statusColor = 'bg-gray-500/20 text-gray-400';
                        if(reg.status === '審核成功') statusColor = 'bg-green-500/20 text-green-400';
                        if(reg.status === '待審核') statusColor = 'bg-yellow-500/20 text-yellow-400';
                        
                        let slotsTxt = reg.slots ? `<span class="bg-gray-800 text-gray-300 px-2 rounded border border-gray-600 text-xs ml-2">位置: ${reg.slots}</span>` : '';
                        
                        let paymentHtml = `<div class="text-xs mt-3 flex flex-col gap-1"><span class="text-gray-500">繳費狀態:</span> <span class="text-white font-esport tracking-widest bg-black p-1 rounded border border-gray-700">${reg.paymentInfo || '未填寫'}</span></div>`;
                        
                        if (reg.status === '待審核' && (!reg.paymentInfo || reg.paymentInfo === '未填寫')) {
                            // 💡 查詢面板也同步帶出該賽事專屬的匯款資訊
                            let instHtml = reg.paymentInstructions ? `<div class="mt-2 mb-2 p-2 bg-gray-800 border-l-2 border-[#FFD700] text-gray-300 text-xs whitespace-pre-line">${reg.paymentInstructions}</div>` : '';
                            
                            let allowedMethods = (reg.paymentMethods || '轉帳').split(',').map(s=>s.trim());
                            let optionsHtml = '';
                            allowedMethods.forEach(method => { optionsHtml += `<option value="${method}">${method}</option>`; });

                            paymentHtml += `
                            ${instHtml}
                            <div class="mt-2 flex gap-1">
                                <select id="updatePayMethod_${reg.regID}" onchange="changeUpdatePayMethod('${reg.regID}')" class="bg-gray-800 border border-gray-600 text-gray-300 px-1 py-1 text-xs rounded focus:border-[#FFD700] outline-none">
                                    ${optionsHtml}
                                </select>
                                <input type="text" id="payUpdate_${reg.regID}" placeholder="末 5 碼" maxlength="5" class="bg-black border border-gray-600 text-white px-2 py-1 text-xs rounded flex-1 focus:border-[#FFD700] outline-none">
                                <button onclick="updatePayment('${reg.regID}')" class="bg-[#FFD700] text-black px-2 py-1 text-xs rounded font-bold hover:brightness-110 transition">送出</button>
                            </div>`;
                        }

                        let roomHtml = '';
                        if(reg.roomUnlocked) {
                            roomHtml = `<div class="mt-4 border border-[#FFD700]/50 bg-[#FFD700]/10 rounded p-4 relative"><div class="text-xs text-[#FFD700] mb-2 font-bold flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-[#FFD700] animate-ping"></span>今日開賽！房間資訊解鎖</div><div class="grid grid-cols-2 gap-4"><div class="bg-black/60 p-2 rounded border border-gray-700"><span class="block text-[10px] text-gray-500 mb-1">Room</span><span class="font-bold text-white select-all">${reg.roomName}</span></div><div class="bg-black/60 p-2 rounded border border-gray-700"><span class="block text-[10px] text-gray-500 mb-1">Password</span><span class="font-esport font-bold text-white tracking-widest select-all">${reg.roomPassword}</span></div></div></div>`;
                        }

                        container.innerHTML += `<div class="bg-gray-900 border border-gray-700 rounded-lg p-5 mb-4"><div class="flex justify-between items-center mb-4"><span class="text-sm text-gray-400 font-bold">${reg.eventName}</span><span class="text-xs ${statusColor} px-2 py-1 rounded font-bold">${reg.status}</span></div><div class="mb-1 text-lg font-esport font-bold text-[#FFD700] flex items-center">${reg.teamName}${slotsTxt}</div>${paymentHtml}${roomHtml}</div>`;
                    });
                } else container.innerHTML = '<div class="text-gray-500 text-center py-10">查無報名紀錄。</div>';
            } catch (error) { alert("查詢失敗"); } finally { hideLoader(); }
        }

        async function updatePayment(regID) {
            const method = document.getElementById(`updatePayMethod_${regID}`).value;
            const inputVal = document.getElementById(`payUpdate_${regID}`).value;
            if(!inputVal) return alert('請填寫繳費資訊');
            const finalInfo = `${method}: ${inputVal}`;
            
            showLoader();
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updatePayment', regID: regID, uid: currentUser.uid, paymentInfo: finalInfo }) });
                const result = await response.json();
                alert(result.message);
                if(result.success) fetchQueryData(); 
            } catch (e) { alert('伺服器錯誤'); } finally { hideLoader(); }
        }

        function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
        async function submitRegister(e) { e.preventDefault(); showLoader(); const payload = { action: 'register', uid: document.getElementById('regUid').value, password: document.getElementById('regPassword').value, teamName: document.getElementById('regTeamName').value, captain: document.getElementById('regCaptain').value, contact: document.getElementById('regContact').value }; try { const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await response.json(); alert(result.message); if (result.success) document.getElementById('registerModal').classList.add('hidden'); } catch (error) { alert('連線伺服器失敗'); } finally { hideLoader(); } }
        async function simulateLogin() { const uid = prompt("隊長 UID:"); const password = prompt("密碼:"); if (!uid || !password) return; showLoader(); try { const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', uid, password }) }); const result = await response.json(); if (result.success) { currentUser = result.user; document.querySelectorAll('#loginSection > button')[0].classList.add('hidden'); document.querySelectorAll('#loginSection > button')[1].classList.add('hidden'); document.getElementById('loggedInUser').classList.remove('hidden'); document.getElementById('displayTeamName').innerText = currentUser.teamName; alert(`歡迎回來，${currentUser.teamName}`); } else alert(result.message); } catch (error) { alert("連線異常"); } finally { hideLoader(); } }
        function logout() { currentUser = null; document.querySelectorAll('#loginSection > button')[0].classList.remove('hidden'); document.querySelectorAll('#loginSection > button')[1].classList.remove('hidden'); document.getElementById('loggedInUser').classList.add('hidden'); document.getElementById('queryResultContainer').innerHTML = '<div class="text-gray-500 text-center py-10 text-sm">請點擊下方按鈕載入紀錄</div>'; }
    </script>
</body>
</html>
